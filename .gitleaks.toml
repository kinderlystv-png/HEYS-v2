# Gitleaks config — allowlist только для public-by-design идентификаторов и
# generated artifacts. Runtime secrets must stay in Yandex Cloud env/Lockbox.

# Inherit default rules.
[extend]
useDefault = true

[allowlist]
description = "Public identifiers, domain keys and generated bundles"
regexTarget = "match"
regexes = [
    # Domain/storage identifiers, not credentials.
    '''key\s*[:=]\s*['"]heys_[a-z0-9_-]+['"]''',
    '''key\s*={2,3}\s*['"]heys_[a-z0-9_-]+['"]''',
    '''todayKey\s*=\s*['"]heys_[a-z0-9_-]+['"]''',
    '''normalizedKey\s*:\s*['"]heys_[a-z0-9_-]+['"]''',
    '''migrationKey\s*=\s*['"]heys_[a-z0-9_-]+['"]''',
    '''p_key\s*:\s*['"]heys_[a-z0-9_-]+['"]''',
    '''key:\s*heys_[a-z0-9_-]+''',
    '''key\s*:\s*['"][cr]\d{2}[a-z]?_[a-z0-9_]+['"]''',
    '''\.key\s*={2,3}\s*['"][cr]\d{2}[a-z]?_[a-z0-9_]+['"]''',
    '''[A-Z0-9_]*(?:KEY|STORAGE_KEY)\s*=\s*['"]heys_[a-z0-9_-]+['"]''',
    '''const\s+[A-Z0-9_]*(?:KEY|STORAGE_KEY)\s*=\s*['"]heys_[a-z0-9_-]+['"]''',
    # Yandex Cloud public resource identifiers (function/api-gateway IDs), not secrets.
    '''\b(?:d4e|d5d|aje)[a-z0-9]{17}\b''',
    # Test-only idempotency labels.
    '''idempotencyKey\s*:\s*['"]idem-[a-z0-9_-]+['"]''',
    # Documentation placeholders/SQL parameter names.
    '''pgp_sym_encrypt\(data,\s*key,\s*['"]cipher-algo=aes256['"]\)'''
]

# Generated/minified bundles — содержимое regenerable из source.
# Если secret leak'нул через bundle, он сначала появится в source (там его и поймаем).
paths = [
    '''apps/web/public/.*\.bundle\.[a-f0-9]+\.js''',
    '''apps/web/public/.*\.bundle\.[a-f0-9]+\.js\.gz''',
    '''apps/web/heys_(advice|day_meals|day)_bundle_v1\.js''',
    '''apps/landing/out/_next/static/.*''',
]
