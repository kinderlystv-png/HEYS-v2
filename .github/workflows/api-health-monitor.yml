name: API Health Monitor

# Регулярный мониторинг состояния production API
# При падении критических endpoints отправляет алерт в Telegram

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: # Ручной запуск для тестирования
  push:
    branches: [main]
    paths:
      - "yandex-cloud-functions/**"
      - ".github/workflows/api-health-monitor.yml"

env:
  API_BASE_URL: https://api.heyslab.ru
  # Force the Node20-runtime JS action (github-script@v7) onto Node 24 — GitHub
  # force-removes Node20 on 2026-06-16. See deploy-yandex.yml for the original rollout.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  health-check:
    name: Check API Health
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: write # Для триггера workflow_dispatch
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -n
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Configure Yandex Cloud read access
        env:
          YC_SERVICE_ACCOUNT_KEY: ${{ secrets.YC_SERVICE_ACCOUNT_KEY }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
        run: |
          if [ -z "$YC_SERVICE_ACCOUNT_KEY" ] || [ -z "$YC_FOLDER_ID" ]; then
            echo "::error::YC_SERVICE_ACCOUNT_KEY / YC_FOLDER_ID are required for quota-error monitoring"
            exit 1
          fi
          umask 077
          printf '%s' "$YC_SERVICE_ACCOUNT_KEY" > key.json
          yc config profile create health-monitor
          yc config set service-account-key key.json
          yc config set folder-id "$YC_FOLDER_ID"
          rm key.json

      - name: Test Health Endpoint
        id: health
        run: |
          echo "🏥 Testing /health endpoint..."
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 10 "${{ env.API_BASE_URL }}/health")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Health check failed with HTTP $HTTP_CODE"
            exit 1
          fi

          # Проверка статуса БД
          DB_STATUS=$(echo "$BODY" | jq -r '.checks.database.status // "unknown"')
          if [ "$DB_STATUS" != "ok" ]; then
            echo "::warning::Database status: $DB_STATUS"
          fi

          echo "✅ Health check passed"

      - name: Test RPC Endpoint
        id: rpc
        run: |
          echo "🔌 Testing RPC endpoint (get_shared_products)..."
          for attempt in 1 2 3; do
            RESPONSE=$(curl -sS -w "\n%{http_code}" --max-time 10 \
              -X POST "${{ env.API_BASE_URL }}/rpc?fn=get_shared_products" \
              -H "Content-Type: application/json" \
              -H "Origin: https://app.heyslab.ru" \
              -d '{"p_limit": 1}' || true)

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            HTTP_CODE="${HTTP_CODE:-000}"
            BODY=$(echo "$RESPONSE" | head -n-1)
            ITEM_COUNT=$(echo "$BODY" | jq 'length // 0' 2>/dev/null || echo 0)

            if [ "$HTTP_CODE" = "200" ] && [ "$ITEM_COUNT" -ge 1 ]; then
              break
            fi

            echo "::warning::RPC attempt $attempt/3 failed (HTTP $HTTP_CODE, items $ITEM_COUNT)"
            if [ "$attempt" -lt 3 ]; then
              sleep 5
            fi
          done

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::RPC endpoint failed with HTTP $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi

          if [ "$ITEM_COUNT" -lt 1 ]; then
            echo "::error::RPC returned empty array"
            exit 1
          fi

          echo "✅ RPC endpoint passed ($ITEM_COUNT products)"

      - name: Test REST Endpoint
        id: rest
        run: |
          echo "📊 Testing REST endpoint (shared_products)..."
          for attempt in 1 2 3; do
            RESPONSE=$(curl -sS -w "\n%{http_code}" --max-time 10 \
              "${{ env.API_BASE_URL }}/rest/shared_products?limit=1" \
              -H "Origin: https://app.heyslab.ru" || true)

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            HTTP_CODE="${HTTP_CODE:-000}"
            BODY=$(echo "$RESPONSE" | head -n-1)

            if [ "$HTTP_CODE" = "200" ]; then
              break
            fi

            echo "::warning::REST attempt $attempt/3 failed with HTTP $HTTP_CODE"
            if [ "$attempt" -lt 3 ]; then
              sleep 5
            fi
          done

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::REST endpoint failed with HTTP $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi

          echo "✅ REST endpoint passed"

      - name: Run no-retry RPC + REST operational canary
        id: capacity_canary
        run: node yandex-cloud-functions/serverless-ops-canary.cjs --strict

      - name: Alert on recent Cloud Functions 429/503 logs
        id: quota_errors
        run: node yandex-cloud-functions/check-serverless-error-logs.cjs --since 20m --strict

      - name: Test Auth Endpoint
        id: auth
        run: |
          echo "🔐 Testing Auth endpoint..."
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 10 \
            -X POST "${{ env.API_BASE_URL }}/auth/login" \
            -H "Content-Type: application/json" \
            -H "Origin: https://app.heyslab.ru" \
            -d '{"email":"test@test.com","password":"wrong"}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          # Auth должен вернуть 401 или 400 с JSON (не 502!)
          if [ "$HTTP_CODE" = "502" ] || [ "$HTTP_CODE" = "503" ]; then
            echo "::error::Auth endpoint down (HTTP $HTTP_CODE)"
            exit 1
          fi

          # Проверка, что вернулся JSON с ошибкой
          if ! echo "$BODY" | jq -e '.message or .error' > /dev/null 2>&1; then
            echo "::error::Auth returned invalid JSON"
            exit 1
          fi

          echo "✅ Auth endpoint passed"

      - name: Check Automation Dead-Man
        id: deadman
        if: always()
        env:
          PGPASSWORD: ${{ secrets.PG_PASSWORD }}
          PGSSLROOTCERT: ${{ github.workspace }}/yandex-cloud-functions/certs/root.crt
        run: |
          if [ -z "$PGPASSWORD" ]; then
            echo "::error::PG_PASSWORD is not configured for the dead-man check"
            exit 1
          fi
          if ! command -v psql >/dev/null 2>&1; then
            echo "::error::psql is unavailable on the runner"
            exit 1
          fi
          node yandex-cloud-functions/check-heys-ops-status.cjs --dead-man --strict --json

      # Auto-redeploy при обнаружении проблем
      - name: Auto-redeploy on API failure
        id: redeploy
        if: github.event_name == 'schedule' && failure() && (steps.rest.outcome == 'failure' || steps.rpc.outcome == 'failure')
        continue-on-error: true # Не падать, если триггер не сработал
        uses: actions/github-script@v7
        with:
          script: |
            try {
              console.log('🔄 Triggering auto-redeploy workflow...');
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'cloud-functions-deploy.yml',
                ref: 'main',
                inputs: { function_name: 'all' }
              });
              console.log('✅ Auto-redeploy triggered successfully');
            } catch (error) {
              console.log('⚠️ Auto-redeploy failed:', error.message);
              console.log('📝 Manual deploy required: ./deploy-all.sh');
            }

      # Алерт в Telegram при падении (только для schedule/push, не для manual)
      - name: Send Telegram Alert on Failure
        if: failure() && (github.event_name == 'schedule' || github.event_name == 'push')
        continue-on-error: true # Не падать, если Telegram не настроен
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="🚨 *HEYS Health / Dead-Man Check Failed*%0A%0A"
          MESSAGE="${MESSAGE}❌ One or more health checks failed%0A"
          MESSAGE="${MESSAGE}🕐 Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')%0A"
          MESSAGE="${MESSAGE}🔗 [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})%0A%0A"
          MESSAGE="${MESSAGE}*Health*: ${{ steps.health.outputs.http_code || 'N/A' }}%0A"
          MESSAGE="${MESSAGE}*RPC*: ${{ steps.rpc.outputs.http_code || 'N/A' }}%0A"
          MESSAGE="${MESSAGE}*REST*: ${{ steps.rest.outputs.http_code || 'N/A' }}%0A"
          MESSAGE="${MESSAGE}*Capacity canary*: ${{ steps.capacity_canary.outcome || 'N/A' }}%0A"
          MESSAGE="${MESSAGE}*429/503 log scan*: ${{ steps.quota_errors.outcome || 'N/A' }}%0A"
          MESSAGE="${MESSAGE}*Auth*: ${{ steps.auth.outputs.http_code || 'N/A' }}%0A%0A"
          MESSAGE="${MESSAGE}*Dead-man*: ${{ steps.deadman.outcome || 'N/A' }}%0A%0A"
          MESSAGE="${MESSAGE}🔄 Auto-redeploy: ${{ steps.redeploy.outcome || 'not-triggered' }}%0A"
          MESSAGE="${MESSAGE}📝 Action: Monitor workflow or run \`./deploy-all.sh\` manually if redeploy fails"

          # Проверка, что токены настроены
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "⚠️ Telegram secrets not configured, skipping alert"
            exit 0
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true"

      # Успешный результат — silent (не спамим в Telegram каждые 5 минут)
      - name: Summary
        if: success()
        run: |
          echo "✅ All API endpoints healthy"
          echo "  - Health: ${{ steps.health.outputs.http_code }}"
          echo "  - RPC: ${{ steps.rpc.outputs.http_code }}"
          echo "  - REST: ${{ steps.rest.outputs.http_code }}"
          echo "  - Auth: ${{ steps.auth.outputs.http_code }}"
          echo "  - Dead-man: ${{ steps.deadman.outcome }}"
