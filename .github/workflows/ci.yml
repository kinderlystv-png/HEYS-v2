name: CI

on:
  # Disable CI for push to main - deploy-yandex.yml handles main branch
  # push:
  #   branches: [main, develop]
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-legacy-bundle-changes:
    name: Detect legacy bundle changes
    runs-on: ubuntu-latest
    outputs:
      legacy_bundles: ${{ steps.filter.outputs.legacy_bundles }}
      mobile_critical: ${{ steps.filter.outputs.mobile_critical }}
      sync_critical: ${{ steps.filter.outputs.sync_critical }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect legacy/runtime-sensitive paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            legacy_bundles:
              - 'apps/web/heys_*.js'
              - 'apps/web/day/**/*.js'
              - 'apps/web/advice/**/*.js'
              - 'apps/web/insights/**/*.js'
              - 'apps/web/widgets/**/*.js'
              - 'apps/web/index.html'
              - 'apps/web/public/sw.js'
              - 'apps/web/public/bundle-manifest.json'
              - 'apps/web/bundle-manifest.json'
              - 'scripts/bundle-legacy.mjs'
              - 'scripts/legacy-bundle-config.mjs'
              - 'scripts/auto-sync-legacy-bundles.mjs'
            sync_critical:
              - 'apps/web/heys_storage_*.js'
              - 'apps/web/heys_auth_*.js'
              - 'apps/web/heys_yandex_api_*.js'
              - 'apps/web/heys_morning_checkin_v1.js'
              - 'apps/web/heys_step_modal_v1.js'
              - 'apps/web/heys_sync_merge_v1.js'
              - 'apps/web/heys_pending_queue_pure_v1.js'
              - 'apps/web/heys_sync_queue_runtime_pure_v1.js'
              - 'apps/web/public/sw.js'
              - 'apps/web/public/bundle-manifest.json'
              - 'apps/web/bundle-manifest.json'
              - 'apps/web/index.html'
              - 'apps/web/__tests__/pending-queue-pure.test.js'
              - 'apps/web/__tests__/sync-queue-runtime-pure.test.js'
              - 'apps/web/__tests__/pwa-update-logic.test.js'
              - 'apps/web/__tests__/heys-auth-*.test.js'
              - 'apps/web/__tests__/morning-checkin-flow-resume.test.js'
              - 'apps/web/__tests__/sync-merge-shared.test.js'
              - 'apps/web/__tests__/yandex-api-session-guards.test.js'
              - 'yandex-cloud-functions/heys-api-rest/lib/heys_sync_merge_v1.cjs'
              - 'yandex-cloud-functions/heys-api-rpc/index.js'
              - 'yandex-cloud-functions/heys-api-rpc/lib/heys_sync_merge_v1.cjs'
              - 'package.json'
              - 'pnpm-lock.yaml'
            mobile_critical:
              - 'apps/mobile/app/**/*.tsx'
              - 'apps/mobile/src/**/*.ts'
              - 'apps/mobile/package.json'
              - 'package.json'
              - 'pnpm-lock.yaml'

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint code
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:unit

  verify-legacy-bundles:
    name: Verify legacy bundles
    runs-on: ubuntu-latest
    needs: [detect-legacy-bundle-changes]
    if: needs.detect-legacy-bundle-changes.outputs.legacy_bundles == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # No pnpm install: script only uses Node built-ins + scripts/*.mjs
      - name: Verify bundle-manifest ↔ public ↔ index.html
        run: node scripts/verify-legacy-bundles.mjs

  test-web-sync-critical:
    name: Test web sync-critical
    runs-on: ubuntu-latest
    needs: [detect-legacy-bundle-changes]
    if: needs.detect-legacy-bundle-changes.outputs.sync_critical == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run sync-critical tests
        run: pnpm test:web:sync-critical

  test-mobile-critical:
    name: Test mobile critical
    runs-on: ubuntu-latest
    needs: [detect-legacy-bundle-changes]
    if: needs.detect-legacy-bundle-changes.outputs.mobile_critical == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run mobile critical tests
        run: pnpm test:mobile:critical

      - name: Type check mobile shell
        run: pnpm --dir apps/mobile type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      [
        detect-legacy-bundle-changes,
        lint,
        type-check,
        test,
        test-mobile-critical,
        verify-legacy-bundles,
        test-web-sync-critical,
      ]
    if: >-
      always() &&
      needs.lint.result == 'success' &&
      needs.type-check.result == 'success' &&
      needs.test.result == 'success' &&
      needs.detect-legacy-bundle-changes.result == 'success' &&
      (
        needs.test-mobile-critical.result == 'success' ||
        needs.test-mobile-critical.result == 'skipped'
      ) &&
      (
        needs.test-web-sync-critical.result == 'success' ||
        needs.test-web-sync-critical.result == 'skipped'
      ) &&
      (
        needs.verify-legacy-bundles.result == 'success' ||
        needs.verify-legacy-bundles.result == 'skipped'
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build
