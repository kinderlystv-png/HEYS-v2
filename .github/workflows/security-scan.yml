name: 🛡️ Security Scan & SAST

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize]
  schedule:
    # Run weekly on Monday at 3:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sast-analysis:
    name: SAST Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # SEC-014 (2026-06-08): убрали continue-on-error после внедрения baseline-ratchet
      # (`security-reports/sast-baseline.json`). SAST падает только на находках вне
      # baseline. Если появилась НОВАЯ дыра — CI зелёный не сделать без триажа.
      # Регенерация baseline после ручного review: `node scripts/security/sast-scan.js --update-baseline`.
      - name: Run SAST Scanner
        run: node scripts/security/sast-scan.js

      - name: Upload SAST Results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: sast-results
          path: security-reports/sast-*.json
          retention-days: 30

  dependency-security:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Dependency Check
        run: node scripts/security/dependency-check.js
        env:
          HEYS_SKIP_OUTDATED_CHECK: "1"

      - name: Upload Dependency Results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: dependency-results
          path: security-reports/dependency-*.json
          retention-days: 30

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # L7 gate: SBOM generation must succeed, otherwise the release has no
      # reproducible dependency inventory for incident response.
      - name: Generate CycloneDX SBOM
        run: pnpm run security:sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: sbom-cyclonedx
          path: security-reports/sbom.cdx.json
          retention-days: 30

  security-report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [sast-analysis, dependency-security, sbom]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download SAST Results
        uses: actions/download-artifact@v8
        with:
          name: sast-results
          path: security-reports/
          digest-mismatch: warn
        continue-on-error: true

      - name: Download Dependency Results
        uses: actions/download-artifact@v8
        with:
          name: dependency-results
          path: security-reports/
          digest-mismatch: warn
        continue-on-error: true

      - name: Generate Security Report
        run: node scripts/security/security-report.js

      - name: Upload Security Report
        uses: actions/upload-artifact@v6
        with:
          name: security-report
          path: |
            security-reports/consolidated/*.json
            security-reports/consolidated/security-dashboard.html
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'security-reports/consolidated/executive-security-summary.json';

            if (!fs.existsSync(reportPath)) {
              console.log('Security report not found, skipping PR comment');
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const score = report.score || 'N/A';
            const status = score >= 80 ? '✅' : score >= 60 ? '⚠️' : '❌';

            const body = `## 🛡️ Security Scan Results

            **Security Score:** ${status} ${score}/100

            | Category | Issues |
            |----------|--------|
            | Critical | ${report.critical || 0} |
            | High | ${report.high || 0} |
            | Medium | ${report.medium || 0} |
            | Low | ${report.low || 0} |

            [View Full Report](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
