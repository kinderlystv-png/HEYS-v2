# Автоматический деплой cloud functions при изменениях в yandex-cloud-functions/
# Это предотвращает ситуацию "изменили код, но забыли задеплоить"

name: Auto-deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - "yandex-cloud-functions/heys-api-*/**"
      - "yandex-cloud-functions/shared/**"
      - "yandex-cloud-functions/deploy-all.sh"
      - "yandex-cloud-functions/api-gateway-spec.yaml"
  workflow_dispatch:
    inputs:
      function_name:
        description: "Function to deploy (leave empty for all)"
        required: false
        type: choice
        options:
          - "all"
          - "heys-api-rpc"
          - "heys-api-rest"
          - "heys-api-auth"
          - "heys-api-leads"
          - "heys-api-health"
          - "heys-api-payments"
          - "heys-api-push"
          - "heys-api-messages"
          - "heys-api-photos"

jobs:
  deploy:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Configure Yandex Cloud
        env:
          YC_SERVICE_ACCOUNT_KEY: ${{ secrets.YC_SERVICE_ACCOUNT_KEY }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
        run: |
          echo "$YC_SERVICE_ACCOUNT_KEY" > key.json
          yc config profile create ci-profile
          yc config set service-account-key key.json
          yc config set folder-id $YC_FOLDER_ID
          rm key.json

      - name: Create .env file
        working-directory: yandex-cloud-functions
        env:
          PG_HOST: ${{ secrets.PG_HOST }}
          PG_PORT: ${{ secrets.PG_PORT }}
          PG_DATABASE: ${{ secrets.PG_DATABASE }}
          PG_USER: ${{ secrets.PG_USER }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          PG_SSL: ${{ secrets.PG_SSL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMS_API_KEY: ${{ secrets.SMS_API_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        run: |
          write_env_var() {
            local key="$1"
            local value="$2"
            value=${value//\'/\'"\'"\'}
            printf "%s='%s'\n" "$key" "$value" >> .env
          }

          : > .env
          write_env_var PG_HOST "$PG_HOST"
          write_env_var PG_PORT "$PG_PORT"
          write_env_var PG_DATABASE "$PG_DATABASE"
          write_env_var PG_USER "$PG_USER"
          write_env_var PG_PASSWORD "$PG_PASSWORD"
          write_env_var PG_SSL "$PG_SSL"
          write_env_var JWT_SECRET "$JWT_SECRET"
          write_env_var SESSION_SECRET "$SESSION_SECRET"
          write_env_var TELEGRAM_BOT_TOKEN "$TELEGRAM_BOT_TOKEN"
          write_env_var TELEGRAM_CHAT_ID "$TELEGRAM_CHAT_ID"
          write_env_var SMS_API_KEY "$SMS_API_KEY"
          write_env_var VAPID_PUBLIC_KEY "$VAPID_PUBLIC_KEY"
          write_env_var VAPID_PRIVATE_KEY "$VAPID_PRIVATE_KEY"
          write_env_var VAPID_SUBJECT "$VAPID_SUBJECT"
          write_env_var S3_ACCESS_KEY_ID "$S3_ACCESS_KEY_ID"
          write_env_var S3_SECRET_ACCESS_KEY "$S3_SECRET_ACCESS_KEY"
          write_env_var YC_FOLDER_ID "${{ secrets.YC_FOLDER_ID }}"

      - name: Determine deployment target
        id: deployment-target
        if: github.event_name == 'push'
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-parse HEAD^ 2>/dev/null || true)
          fi

          if [ -z "$BEFORE" ]; then
            echo "mode=all" >> "$GITHUB_OUTPUT"
            echo "reason=no-previous-commit" >> "$GITHUB_OUTPUT"
            echo "gateway_spec_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BEFORE" "$AFTER")
          echo "Changed files:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -Eq '^yandex-cloud-functions/api-gateway-spec\.yaml$'; then
            echo "gateway_spec_changed=true" >> "$GITHUB_OUTPUT"
            NON_GATEWAY_CHANGED=$(echo "$CHANGED_FILES" | grep -Ev '^yandex-cloud-functions/api-gateway-spec\.yaml$' || true)
            if [ -z "$NON_GATEWAY_CHANGED" ]; then
              echo "mode=gateway-only" >> "$GITHUB_OUTPUT"
              echo "reason=gateway-spec-only" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "gateway_spec_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -Eq '^yandex-cloud-functions/(shared/|deploy-all\.sh$)'; then
            echo "mode=all" >> "$GITHUB_OUTPUT"
            echo "reason=shared-or-deploy-script-changed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t FUNCTIONS < <(echo "$CHANGED_FILES" | sed -n 's#^yandex-cloud-functions/\(heys-api-[^/]*\)/.*#\1#p' | sort -u)

          if [ "${#FUNCTIONS[@]}" -eq 0 ]; then
            echo "mode=all" >> "$GITHUB_OUTPUT"
            echo "reason=no-specific-function-detected" >> "$GITHUB_OUTPUT"
          else
            SELECTED_FUNCTIONS=$(IFS=,; echo "${FUNCTIONS[*]}")
            echo "mode=selective" >> "$GITHUB_OUTPUT"
            echo "functions=$SELECTED_FUNCTIONS" >> "$GITHUB_OUTPUT"
            echo "reason=changed-function-directories" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy functions
        shell: bash
        working-directory: yandex-cloud-functions
        run: |
          chmod +x deploy-all.sh
          MANUAL_FUNCTION="${{ inputs.function_name }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$MANUAL_FUNCTION" ] && [ "$MANUAL_FUNCTION" != "all" ]; then
            echo "🎯 Deploying single function: $MANUAL_FUNCTION"
            ./deploy-all.sh "$MANUAL_FUNCTION" --ci --skip-health
          elif [ "${{ steps.deployment-target.outputs.mode }}" = "gateway-only" ]; then
            echo "🌐 Gateway spec only — skipping function deploy"
          elif [ "${{ steps.deployment-target.outputs.mode }}" = "selective" ]; then
            IFS=',' read -r -a FUNCTIONS <<< "${{ steps.deployment-target.outputs.functions }}"
            echo "🎯 Selective deploy: ${FUNCTIONS[*]}"
            for func_name in "${FUNCTIONS[@]}"; do
              ./deploy-all.sh "$func_name" --ci --skip-health
            done
          else
            echo "🚀 Deploying all functions (${{ steps.deployment-target.outputs.reason }})"
            ./deploy-all.sh --ci --skip-health
          fi

      - name: Update API Gateway
        if: steps.deployment-target.outputs.gateway_spec_changed == 'true' || (github.event_name == 'workflow_dispatch' && (inputs.function_name == '' || inputs.function_name == 'all'))
        shell: bash
        working-directory: yandex-cloud-functions
        run: |
          yc serverless api-gateway update \
            --id=d5d7939njvjp27ofsok0 \
            --spec=api-gateway-spec.yaml

      - name: Verify deployment
        run: |
          retry_http_check() {
            local name="$1"
            local expected="$2"
            local check_fn="$3"
            local attempts="${4:-4}"
            local delay_seconds="${5:-10}"
            local status=""

            for attempt in $(seq 1 "$attempts"); do
              status="$($check_fn)"

              if [ "$status" = "$expected" ]; then
                echo "✅ $name: OK (HTTP $status, attempt $attempt/$attempts)"
                return 0
              fi

              echo "⚠️ $name attempt $attempt/$attempts returned HTTP $status"
              if [ "$attempt" -lt "$attempts" ]; then
                echo "⏳ Waiting ${delay_seconds}s before retry..."
                sleep "$delay_seconds"
              fi
            done

            echo "::error::$name failed after $attempts attempts (last HTTP $status, expected $expected)"
            return 1
          }

          check_health() {
            curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "https://api.heyslab.ru/health"
          }

          check_rpc() {
            curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 -X POST "https://api.heyslab.ru/rpc?fn=get_shared_products" \
              -H "Content-Type: application/json" \
              -H "Origin: https://app.heyslab.ru" \
              -d '{}'
          }

          check_rest() {
            curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 "https://api.heyslab.ru/rest/shared_products?limit=1" \
              -H "Origin: https://app.heyslab.ru"
          }

          check_client_logout_preflight() {
            curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 -X OPTIONS "https://api.heyslab.ru/auth/client-logout" \
              -H "Origin: https://app.heyslab.ru" \
              -H "Access-Control-Request-Method: POST"
          }

          check_curator_logout_preflight() {
            curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 -X OPTIONS "https://api.heyslab.ru/auth/curator-logout" \
              -H "Origin: https://app.heyslab.ru" \
              -H "Access-Control-Request-Method: POST"
          }

          echo "⏳ Waiting 15s for functions to warm up..."
          sleep 15

          echo "🧪 Testing deployed functions with retries..."
          retry_http_check "Health check" "200" check_health
          retry_http_check "RPC endpoint" "200" check_rpc
          retry_http_check "REST endpoint" "200" check_rest
          retry_http_check "Client logout preflight" "204" check_client_logout_preflight
          retry_http_check "Curator logout preflight" "204" check_curator_logout_preflight

          echo "✅ Deployment verified successfully"

      - name: Notify Telegram on Success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" | head -c 100)
          MESSAGE="✅ *Cloud Functions Deployed*%0A%0A"
          MESSAGE="${MESSAGE}📦 Commit: \`${COMMIT_MSG}\`%0A"
          MESSAGE="${MESSAGE}👤 Author: ${{ github.actor }}%0A"
          MESSAGE="${MESSAGE}🕐 Time: $(date -u +'%H:%M UTC')%0A"
          MESSAGE="${MESSAGE}🔗 [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true"

      - name: Notify Telegram on Failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="🚨 *Cloud Functions Deployment Failed*%0A%0A"
          MESSAGE="${MESSAGE}❌ Auto-deployment failed%0A"
          MESSAGE="${MESSAGE}👤 Author: ${{ github.actor }}%0A"
          MESSAGE="${MESSAGE}🔗 [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})%0A%0A"
          MESSAGE="${MESSAGE}📝 Action: Check logs and deploy manually"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true"
