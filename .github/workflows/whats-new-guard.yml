name: What's New Guard

on:
  pull_request:
    branches: [main]

jobs:
  validate-whats-new:
    name: Validate What's New entry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 20

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Validate release notes metadata
        run: node scripts/prepare-release.mjs --check
