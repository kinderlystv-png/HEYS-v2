name: What's New Guard

on:
  pull_request:
    branches: [main]

env:
  # Force the remaining Node20-runtime JS action (setup-node@v4) onto Node 24 — GitHub
  # force-removes Node20 on 2026-06-16. Safer than setup-node@v5 (breaks pnpm lookup).
  # See deploy-yandex.yml for the original rollout.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-whats-new:
    name: Validate What's New entry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 20

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate release notes metadata
        run: node scripts/prepare-release.mjs --check
