name: Deploy to Yandex Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_full:
        description: "Skip release-only classifier, run full build + upload"
        type: boolean
        default: false

# Сериализуем deploy'и на main: два одновременных push'а (или push + ручной
# workflow_dispatch) пойдут в очередь, не параллельно. cancel-in-progress: false
# чтобы текущий deploy дозавершился — иначе риск частичной загрузки в S3.
# Без этого блока race: fast-path может закончиться позже full build от
# предыдущего push'а и затереть свежие бандлы старым whats-new.json.
concurrency:
  group: deploy-yandex-main
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  NODE_VERSION: "18"
  PNPM_VERSION: "8"
  # Opt the remaining Node20-runtime actions (setup-node@v4, cache@v3,
  # pnpm/action-setup@v2) onto Node 24 — the official migration path GitHub forces on
  # 2026-06-16. Avoids the risky major bumps (setup-node@v5 breaks pnpm lookup in jobs
  # without a preceding pnpm/action-setup). checkout is already @v5 (native Node 24).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Yandex Cloud Object Storage
  YC_BUCKET_PWA: heys-app # PWA приложение → app.heyslab.ru
  YC_BUCKET_LANDING: heys-static # Лендинг → heyslab.ru (CDN origin: heys-static.website.yandexcloud.net)
  YC_ENDPOINT: https://storage.yandexcloud.net

jobs:
  # Classify push: full build vs fast-path (whats-new only).
  # Calls prepare-release.mjs --is-release-only-push which uses isReleaseMetaOnlyFile()
  # as single source of truth — same logic as Phase A pre-push check.
  detect:
    name: Detect push kind
    runs-on: ubuntu-latest
    outputs:
      release_only: ${{ steps.classify.outputs.release_only }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Usually enough to include the currently deployed hash. The classifier
          # deepens below only when production is older than this shallow window.
          fetch-depth: 256

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - id: classify
        name: Classify push (S3-aware, release-only vs code-bearing)
        # 2026-06-01: переход с $BEFORE..$AFTER на deployed-hash-as-baseline.
        # Старая логика смотрела только diff одного push'а — после провалившегося
        # full deploy следующий release-bump push'еr классифицировался как fast-path
        # и оставлял прод с устаревшими бандлами (incident 2026-06-01: 5 commits
        # застряли). Теперь baseline = hash из public build-meta.json на S3:
        # если между deployed и HEAD есть хоть один code-bearing commit → full build.
        run: |
          if [ "${{ github.event.inputs.force_full }}" = "true" ]; then
            echo "🔧 Manual force_full=true — bypass classifier"
            echo "release_only=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          DEPLOYED_HASH=$(curl -fsS -m 15 "https://storage.yandexcloud.net/heys-app/build-meta.json?bust=$(date +%s)" 2>/dev/null \
            | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{console.log(JSON.parse(d).hash||"")}catch{console.log("")}})' \
            || echo "")

          if [ -z "$DEPLOYED_HASH" ]; then
            echo "⚠️ Cannot fetch deployed build-meta.json — safe default: full build"
            echo "release_only=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if ! git cat-file -e "$DEPLOYED_HASH" 2>/dev/null; then
            echo "ℹ️ Deployed hash $DEPLOYED_HASH is outside shallow checkout — fetching full history"
            git fetch --no-tags --prune --unshallow origin 2>/dev/null || git fetch --no-tags --prune origin
          fi

          if ! git cat-file -e "$DEPLOYED_HASH" 2>/dev/null; then
            echo "⚠️ Deployed hash $DEPLOYED_HASH not in git history (force-push? rebase?) — full build"
            echo "release_only=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "🔍 Deployed hash baseline: $DEPLOYED_HASH"

          if node scripts/prepare-release.mjs --is-release-only-push "$DEPLOYED_HASH" "HEAD"; then
            echo "release_only=true" >> $GITHUB_OUTPUT
            echo "✅ Fast-path: only release-meta files changed since $DEPLOYED_HASH"
          else
            echo "release_only=false" >> $GITHUB_OUTPUT
            echo "📦 Full build: code changes since $DEPLOYED_HASH"
          fi

  # 🧪 Gate: run the same unit suite the pre-push hook runs (known green) BEFORE any
  # prod upload. Closes the hole where a --no-verify push or a GitHub-UI merge could
  # deploy untested code (ci.yml is PR-only and historically red, so it is no gate).
  # Skipped for release-only (whats-new) pushes — no code changes there.
  test:
    name: Unit tests (deploy gate)
    needs: detect
    if: needs.detect.outputs.release_only != 'true'
    runs-on: ubuntu-latest
    # HARD gate: a red suite blocks the deploy. The full apps/web suite is green under
    # the CI timezone (UTC) — the one tz-fragile test (heys_relapse_risk) was fixed to
    # use a tz-naive `now`. If this job goes red, deploy-artifact is skipped by design.
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run unit tests (same command as the pre-push gate)
        run: cd apps/web && pnpm exec vitest run --retry=1

  build-artifact:
    name: Build deploy artifact
    needs: detect
    if: needs.detect.outputs.release_only != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # Deep enough for normal deployed..HEAD checks; deepened on demand below.
          fetch-depth: 256
          submodules: false

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Turbo cache для ускорения инкрементных сборок
      - name: Setup Turbo cache
        uses: actions/cache@v3
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate What's New before deploy
        run: |
          # Pass the currently-deployed commit so the whats-new check covers the real
          # ship range (deployed..HEAD) in CI, where origin/main==HEAD makes the usual
          # range empty. This removes the need for a manual `chore(release): bump` commit
          # when a push carries more than one substantive commit.
          DEPLOYED=$(curl -fsS -m 15 "https://storage.yandexcloud.net/heys-app/build-meta.json?bust=$(date +%s)" 2>/dev/null \
            | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{console.log(JSON.parse(d).hash||"")}catch{console.log("")}})' \
            || echo "")
          echo "Whats-new range baseline (deployed hash): ${DEPLOYED:-<none>}"
          if [ -n "$DEPLOYED" ] && ! git cat-file -e "$DEPLOYED" 2>/dev/null; then
            echo "ℹ️ Deployed hash is outside shallow checkout — fetching full history"
            git fetch --no-tags --prune --unshallow origin 2>/dev/null || git fetch --no-tags --prune origin
          fi
          HEYS_DEPLOYED_HASH="$DEPLOYED" HEYS_REQUIRE_COVERED_COMMITS=1 node scripts/prepare-release.mjs --check

      # TODO: Fix CI test environment (tests pass locally but fail in CI)
      # - name: Run critical tests
      #   run: |
      #     cd apps/web && pnpm run test -- \
      #       "__tests__/sync-race-condition.test.js" \
      #       "__tests__/merge-day-data.test.js" \
      #       "__tests__/auth-session.test.js" \
      #       "__tests__/storage-layer.test.js" \
      #       "__tests__/products-protection.test.js" \
      #       "__tests__/data-models.test.js"

      # Параллельная сборка PWA и Landing с проверкой exit codes
      - name: Build apps (parallel)
        run: |
          set -e  # Exit on first error

          # Запуск билдов в background
          pnpm --filter @heys/web run build &
          PID_PWA=$!
          pnpm --filter @heys/landing run build &
          PID_LANDING=$!

          # Ждём и проверяем exit codes КАЖДОГО процесса
          FAIL=0
          wait $PID_PWA || { echo "❌ PWA build FAILED!"; FAIL=1; }
          wait $PID_LANDING || { echo "❌ Landing build FAILED!"; FAIL=1; }

          if [ $FAIL -eq 1 ]; then
            echo "::error::One or more builds failed!"
            exit 1
          fi

          echo "✅ Both builds completed successfully"
        env:
          VITE_API_URL: https://api.heyslab.ru

      # 🛡️ ЗАЩИТА: Валидация что PWA build создал все необходимые файлы
      - name: Validate PWA build output
        run: |
          echo "🔍 Validating PWA build output..."

          # Проверяем что dist существует
          if [ ! -d "apps/web/dist" ]; then
            echo "::error::apps/web/dist directory not found!"
            exit 1
          fi

          # Считаем heys_*.js файлы (должно быть минимум 50)
          JS_COUNT=$(ls -1 apps/web/dist/heys_*.js 2>/dev/null | wc -l)
          echo "📦 Found $JS_COUNT heys_*.js files in dist"

          if [ "$JS_COUNT" -lt 50 ]; then
            echo "::error::Expected at least 50 heys_*.js files, found only $JS_COUNT!"
            echo "This usually means the build failed silently."
            echo "Check that all dependencies are installed (e.g., esbuild)."
            ls -la apps/web/dist/ | head -20
            exit 1
          fi

          # Проверяем критические файлы
          CRITICAL_FILES=(
            "apps/web/dist/heys_app_v12.js"
            "apps/web/dist/heys_core_v12.js"
            "apps/web/dist/heys_day_v12.js"
            "apps/web/dist/heys_add_product_step_v1.js"
            "apps/web/dist/index.html"
            "apps/web/dist/version.json"
          )

          for file in "${CRITICAL_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error::Critical file missing: $file"
              exit 1
            fi
          done

          echo "✅ PWA build validation passed ($JS_COUNT JS files)"

      - name: Ensure SW from public
        run: |
          if [ -f apps/web/public/sw.js ]; then
            cp apps/web/public/sw.js apps/web/dist/sw.js
            echo "✅ Copied public/sw.js to dist/sw.js"
          else
            echo "❌ apps/web/public/sw.js not found"
            exit 1
          fi

      - name: Read build version from generated file
        run: |
          # version.json создаётся в prebuild скриптом update-version.cjs
          # НЕ перезаписываем его — просто читаем для логов и summary
          if [ -f apps/web/dist/version.json ]; then
            VERSION=$(cat apps/web/dist/version.json | jq -r '.version')
            echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV
            echo "✅ Build version from prebuild: $VERSION"
            cat apps/web/dist/version.json
          else
            echo "⚠️ version.json not found, using fallback"
            VERSION=$(date +%Y.%m.%d.%H%M).${{ github.run_number }}
            echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV
            echo "{\"version\":\"$VERSION\",\"buildTime\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"commit\":\"${{ github.sha }}\"}" > apps/web/dist/version.json
          fi

      - name: Validate runtime version sync
        run: |
          echo "🔍 Validating runtime version sync..."

          VERSION=$(jq -r '.version' apps/web/dist/build-meta.json)
          MANIFEST_PATH="apps/web/dist/bundle-manifest.json"

          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "::error::bundle-manifest.json not found in dist"
            exit 1
          fi

          BOOT_CORE=$(jq -r '."boot-core".file' "$MANIFEST_PATH")

          if [ -z "$BOOT_CORE" ] || [ "$BOOT_CORE" = "null" ]; then
            echo "::error::Missing boot-core entry in manifest"
            exit 1
          fi

          if [ ! -f "apps/web/dist/$BOOT_CORE" ]; then
            echo "::error::Runtime bundle missing from dist: $BOOT_CORE"
            exit 1
          fi

          if ! grep -F "$VERSION" "apps/web/dist/$BOOT_CORE" >/dev/null; then
            echo "::error::Runtime version $VERSION not found inside $BOOT_CORE"
            exit 1
          fi

          echo "✅ boot-core is aligned with build-meta version $VERSION"

      - name: Read SW cache version
        run: |
          if [ -f apps/web/dist/sw.js ]; then
            CACHE_VERSION=$(node -e "const fs=require('fs');const s=fs.readFileSync('apps/web/dist/sw.js','utf8');const m=s.match(/const CACHE_VERSION = '([^']+)'/);process.stdout.write(m?m[1]:'');")
            echo "SW_CACHE_VERSION=$CACHE_VERSION" >> $GITHUB_ENV
            echo "✅ SW cache version: $CACHE_VERSION"
          else
            echo "⚠️ sw.js not found in dist"
            echo "SW_CACHE_VERSION=unknown" >> $GITHUB_ENV
          fi

      - name: Upload PWA artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwa-dist
          path: apps/web/dist
          if-no-files-found: error
          retention-days: 1

      - name: Upload Landing artifact
        uses: actions/upload-artifact@v4
        with:
          name: landing-out
          path: apps/landing/out
          if-no-files-found: error
          retention-days: 1

  deploy-artifact:
    name: Deploy artifact to Yandex Cloud
    needs: [detect, test, build-artifact]
    if: needs.detect.outputs.release_only != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download PWA artifact
        uses: actions/download-artifact@v4
        with:
          name: pwa-dist
          path: apps/web/dist

      - name: Download Landing artifact
        uses: actions/download-artifact@v4
        with:
          name: landing-out
          path: apps/landing/out

      - name: Read build version from artifact
        run: |
          if [ -f apps/web/dist/version.json ]; then
            VERSION=$(jq -r '.version' apps/web/dist/version.json)
            echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV
            echo "✅ Build version from artifact: $VERSION"
            cat apps/web/dist/version.json
          else
            echo "::error::version.json missing in PWA artifact"
            exit 1
          fi

      - name: Read SW cache version
        run: |
          if [ -f apps/web/dist/sw.js ]; then
            CACHE_VERSION=$(node -e "const fs=require('fs');const s=fs.readFileSync('apps/web/dist/sw.js','utf8');const m=s.match(/const CACHE_VERSION = '([^']+)'/);process.stdout.write(m?m[1]:'');")
            echo "SW_CACHE_VERSION=$CACHE_VERSION" >> $GITHUB_ENV
            echo "✅ SW cache version: $CACHE_VERSION"
          else
            echo "⚠️ sw.js not found in PWA artifact"
            echo "SW_CACHE_VERSION=unknown" >> $GITHUB_ENV
          fi

      - name: Configure AWS CLI for Yandex Cloud
        # AWS CLI уже предустановлен на ubuntu-latest!
        run: |
          aws configure set aws_access_key_id ${{ secrets.YC_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.YC_SECRET_ACCESS_KEY }}
          aws configure set default.region ru-central1
          aws configure set default.s3.max_concurrent_requests 30
          aws configure set default.s3.max_queue_size 10000

      - name: Deploy PWA to Yandex Object Storage
        run: |
          # === PWA Application → heys-app bucket ===
          # GOLDEN STANDARD CACHING STRATEGY

          DOCS_VERSION=$(node -e "const fs=require('fs'); const s=fs.readFileSync('apps/web/dist/heys_consents_v1.js','utf8'); const m=s.match(/user_agreement:\\s*'([^']+)'/); process.stdout.write(m?m[1]:'');")
          echo "📜 Legal docs version: ${DOCS_VERSION:-unknown}"

          # === STEP 1: Immutable Assets (1 year cache) ===
          # Images, fonts, hashed assets in assets/ folder
          # Excludes: bundles (uploaded gzipped in Step 2.0), JS files (Step 2), entry points (Step 3)
          echo "📦 Uploading immutable assets..."
          aws s3 sync apps/web/dist/ s3://${{ env.YC_BUCKET_PWA }}/ \
            --endpoint-url=${{ env.YC_ENDPOINT }} \
            --exclude "index.html" \
            --exclude "sw.js" \
            --exclude "version.json" \
            --exclude "build-meta.json" \
            --exclude "whats-new.json" \
            --exclude "manifest.json" \
            --exclude "manifest.webmanifest" \
            --exclude "heys_*.js" \
            --exclude "react-bundle.js" \
            --exclude "react-bundle.js.gz" \
            --exclude "*.bundle.*.js" \
            --exclude "*.bundle.*.js.gz" \
            --exclude "day/*" \
            --exclude "advice/*" \
            --cache-control "public, max-age=31536000, immutable"

          # === STEP 1.5: Gzipped Bundles (immutable, Content-Encoding: gzip) ===
          # Pre-compressed .gz files uploaded AS .js with Content-Encoding: gzip header.
          # Browsers decompress transparently; SW caches decompressed response.
          # Savings: 8.65MB → 1.90MB (78%), boot 29s → ~6s at same speed.
          echo "🗜️ Uploading gzipped bundles with Content-Encoding: gzip..."
          GZ_UPLOAD_COUNT=0
          for gzfile in apps/web/dist/*.bundle.*.js.gz; do
            if [ -f "$gzfile" ]; then
              # boot-core.bundle.abc123.js.gz → boot-core.bundle.abc123.js
              jsname=$(basename "${gzfile%.gz}")
              aws s3 cp "$gzfile" s3://${{ env.YC_BUCKET_PWA }}/$jsname \
                --endpoint-url=${{ env.YC_ENDPOINT }} \
                --cache-control "public, max-age=31536000, immutable" \
                --content-type "application/javascript" \
                --content-encoding "gzip" &
              GZ_UPLOAD_COUNT=$((GZ_UPLOAD_COUNT + 1))
            fi
          done
          wait
          echo "✅ Uploaded $GZ_UPLOAD_COUNT gzipped bundles"

          # === STEP 2: Mutable JS Files (0 cache, must-revalidate) ===
          # These files change often but keep the same name
          echo "📜 Updating mutable JS files (max-age=0)..."
          JS_UPLOAD_COUNT=$(find apps/web/dist -maxdepth 1 -type f -name "heys_*.js" | wc -l | tr -d ' ')

          # 🛡️ ЗАЩИТА: Проверяем что build создал ожидаемый набор mutable JS
          if [ "$JS_UPLOAD_COUNT" -lt 50 ]; then
            echo "::error::Only $JS_UPLOAD_COUNT heys_*.js files found in dist (expected 50+)!"
            echo "Build likely failed silently. Check build logs."
            exit 1
          fi

          aws s3 sync apps/web/dist/ s3://${{ env.YC_BUCKET_PWA }}/ \
            --endpoint-url=${{ env.YC_ENDPOINT }} \
            --exclude "*" \
            --include "heys_*.js" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "application/javascript" \
            --no-progress

          echo "✅ Uploaded $JS_UPLOAD_COUNT heys_*.js files"

          # === STEP 2.1: React bundle (critical, gzipped, no cache) ===
          if [ -f "apps/web/dist/react-bundle.js.gz" ]; then
            echo "⚛️ Uploading react-bundle.js (gzipped: 139KB → 45KB)..."
            aws s3 cp apps/web/dist/react-bundle.js.gz s3://${{ env.YC_BUCKET_PWA }}/react-bundle.js \
              --endpoint-url=${{ env.YC_ENDPOINT }} \
              --cache-control "public, max-age=0, must-revalidate" \
              --content-type "application/javascript" \
              --content-encoding "gzip"
          elif [ -f "apps/web/dist/react-bundle.js" ]; then
            echo "⚛️ Uploading react-bundle.js (uncompressed fallback)..."
            aws s3 cp apps/web/dist/react-bundle.js s3://${{ env.YC_BUCKET_PWA }}/react-bundle.js \
              --endpoint-url=${{ env.YC_ENDPOINT }} \
              --cache-control "public, max-age=0, must-revalidate" \
              --content-type "application/javascript"
          fi

          # === STEP 2.5: Widgets folder ===
          if [ -d "apps/web/dist/widgets" ]; then
            echo "🧩 Uploading widgets folder..."
            aws s3 sync apps/web/dist/widgets/ s3://${{ env.YC_BUCKET_PWA }}/widgets/ \
              --endpoint-url=${{ env.YC_ENDPOINT }} \
              --cache-control "public, max-age=0, must-revalidate"
          fi

          # === STEP 2.6: Insights folder (modular Predictive Insights) ===
          if [ -d "apps/web/dist/insights" ]; then
            echo "🧠 Uploading insights folder (15 pi_*.js modules)..."
            aws s3 sync apps/web/dist/insights/ s3://${{ env.YC_BUCKET_PWA }}/insights/ \
              --endpoint-url=${{ env.YC_ENDPOINT }} \
              --cache-control "public, max-age=0, must-revalidate"
          fi

          # === STEP 2.7: Day folder (modular day components) ===
          if [ -d "apps/web/dist/day" ]; then
            echo "📅 Uploading day folder (modular _*.js components)..."
            aws s3 sync apps/web/dist/day/ s3://${{ env.YC_BUCKET_PWA }}/day/ \
              --endpoint-url=${{ env.YC_ENDPOINT }} \
              --cache-control "public, max-age=0, must-revalidate"
          fi

          # === STEP 2.8: Advice folder (modular advice rules) ===
          if [ -d "apps/web/dist/advice" ]; then
            echo "💡 Uploading advice folder (modular _*.js rules)..."
            aws s3 sync apps/web/dist/advice/ s3://${{ env.YC_BUCKET_PWA }}/advice/ \
              --endpoint-url=${{ env.YC_ENDPOINT }} \
              --cache-control "public, max-age=0, must-revalidate"
          fi

          # === STEP 3: Entry Points (NO CACHE AT ALL) ===
          # index.html, sw.js, version.json - must always be fresh
          echo "📄 Updating entry points (no-store)..."

          aws s3 cp apps/web/dist/index.html s3://${{ env.YC_BUCKET_PWA }}/index.html \
            --endpoint-url=${{ env.YC_ENDPOINT }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8" &

          aws s3 cp apps/web/dist/sw.js s3://${{ env.YC_BUCKET_PWA }}/sw.js \
            --endpoint-url=${{ env.YC_ENDPOINT }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/javascript" &

          aws s3 cp apps/web/dist/version.json s3://${{ env.YC_BUCKET_PWA }}/version.json \
            --endpoint-url=${{ env.YC_ENDPOINT }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/json" &

          aws s3 cp apps/web/dist/manifest.json s3://${{ env.YC_BUCKET_PWA }}/manifest.json \
            --endpoint-url=${{ env.YC_ENDPOINT }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/manifest+json" &

          aws s3 cp apps/web/dist/manifest.json s3://${{ env.YC_BUCKET_PWA }}/manifest.webmanifest \
            --endpoint-url=${{ env.YC_ENDPOINT }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/manifest+json" &

          aws s3 cp apps/web/dist/build-meta.json s3://${{ env.YC_BUCKET_PWA }}/build-meta.json \
            --endpoint-url=${{ env.YC_ENDPOINT }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/json" &

          aws s3 cp apps/web/dist/whats-new.json s3://${{ env.YC_BUCKET_PWA }}/whats-new.json \
            --endpoint-url=${{ env.YC_ENDPOINT }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/json" &

          wait

          # === STEP 4: Legal Docs ===
          if [ -n "$DOCS_VERSION" ] && [ -d "apps/web/dist/docs" ]; then
            echo "📋 Uploading legal docs..."
            # Versioned path (immutable)
            aws s3 cp apps/web/dist/docs/ s3://${{ env.YC_BUCKET_PWA }}/docs/v${DOCS_VERSION}/ \
              --recursive --endpoint-url=${{ env.YC_ENDPOINT }} \
              --cache-control "public, max-age=31536000, immutable" &

            # Latest path (no-cache)
            aws s3 cp apps/web/dist/docs/ s3://${{ env.YC_BUCKET_PWA }}/docs/ \
              --recursive --endpoint-url=${{ env.YC_ENDPOINT }} \
              --cache-control "no-cache, no-store, must-revalidate" &

            wait
          fi

          echo "✅ PWA deployment complete!"

      - name: Deploy Landing to Yandex Object Storage
        run: |
          # === Landing Page → heys-static bucket ===
          # Оптимизированный деплой Next.js static export

          # STEP 1: Всё с дефолтным кэшем (1 год)
          echo "📦 Landing: Uploading all files..."
          aws s3 sync apps/landing/out/ s3://${{ env.YC_BUCKET_LANDING }}/ \
            --endpoint-url=${{ env.YC_ENDPOINT }} \
            --cache-control "public, max-age=31536000, immutable"

          # STEP 2: HTML без кэша (параллельно)
          echo "📄 Landing: Updating HTML files (no-cache)..."
          for htmlfile in apps/landing/out/*.html apps/landing/out/**/*.html; do
            if [ -f "$htmlfile" ]; then
              relpath="${htmlfile#apps/landing/out/}"
              aws s3 cp "$htmlfile" "s3://${{ env.YC_BUCKET_LANDING }}/$relpath" \
                --endpoint-url=${{ env.YC_ENDPOINT }} \
                --cache-control "no-cache, no-store, must-revalidate" \
                --content-type "text/html; charset=utf-8" &
            fi
          done
          wait

          echo "✅ Landing deployment complete!"

      - name: Invalidate CDN cache
        continue-on-error: true
        env:
          YC_TOKEN: ${{ secrets.YC_OAUTH_TOKEN }}
          YC_FOLDER: ${{ secrets.YC_FOLDER_ID }}
          # CDN Resource IDs (из infra/README.md)
          CDN_PWA_ID: bc8rvrvenqslkmti5yts
          CDN_LANDING_ID: bc8rk3pnqppsfime3nth
        run: |
          # Пропускаем если нет токена
          if [ -z "$YC_TOKEN" ]; then
            echo "⏭️ Skipping CDN invalidation (no YC_OAUTH_TOKEN)"
            exit 0
          fi

          # Устанавливаем YC CLI
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -n
          export PATH="$HOME/yandex-cloud/bin:$PATH"

          # Конфигурируем
          yc config set token "$YC_TOKEN"
          yc config set folder-id "$YC_FOLDER"

          # === PWA CDN Invalidation ===
          echo "🔄 Purging CDN cache for PWA..."

          # Критичные файлы (без кэша)
          yc cdn cache purge --resource-id "$CDN_PWA_ID" \
            --path "/" \
            --path "/index.html" \
            --path "/sw.js" \
            --path "/manifest.json" \
            --path "/manifest.webmanifest" \
            --path "/version.json" || true

          # ВСЕ кастомные JS файлы — динамический список!
          echo "🔄 Purging all heys_*.js files..."
          JS_PATHS=""
          for jsfile in apps/web/dist/heys_*.js; do
            if [ -f "$jsfile" ]; then
              filename=$(basename "$jsfile")
              JS_PATHS="$JS_PATHS --path /$filename"
              echo "  → /$filename"
            fi
          done

          if [ -n "$JS_PATHS" ]; then
            yc cdn cache purge --resource-id "$CDN_PWA_ID" $JS_PATHS || true
          fi

          # Юридические документы — ВСЕГДА инвалидируем (152-ФЗ compliance)
          echo "🔄 Purging legal docs from CDN cache..."
          DOCS_VERSION=$(node -e "const fs=require('fs'); const s=fs.readFileSync('apps/web/dist/heys_consents_v1.js','utf8'); const m=s.match(/user_agreement:\\s*'([^']+)'/); process.stdout.write(m?m[1]:'');")
          echo "  Legal docs version: ${DOCS_VERSION:-unknown}"

          yc cdn cache purge --resource-id "$CDN_PWA_ID" \
            --path "/docs/user-agreement.md" \
            --path "/docs/privacy-policy.md" \
            --path "/docs/consent-forms.md" \
            --path "/docs/chat-rules.md" || true

          # Версионированные пути юридики
          if [ -n "$DOCS_VERSION" ]; then
            yc cdn cache purge --resource-id "$CDN_PWA_ID" \
              --path "/docs/v${DOCS_VERSION}/user-agreement.md" \
              --path "/docs/v${DOCS_VERSION}/privacy-policy.md" \
              --path "/docs/v${DOCS_VERSION}/consent-forms.md" \
              --path "/docs/v${DOCS_VERSION}/chat-rules.md" || true
          fi

          # === Landing CDN Invalidation ===
          echo "🔄 Purging CDN cache for Landing..."
          yc cdn cache purge --resource-id "$CDN_LANDING_ID" \
            --path "/" \
            --path "/index.html" || true

          echo "✅ CDN cache purged for all critical paths"

      - name: Health check
        run: |
          echo "🏥 Running health checks..."

          # Validate ORIGIN (Object Storage) — this is the real signal that deploy succeeded.
          PWA_ORIGIN_URL="${YC_ENDPOINT}/${YC_BUCKET_PWA}/index.html"
          LANDING_ORIGIN_URL="${YC_ENDPOINT}/${YC_BUCKET_LANDING}/index.html"
          API_URL="https://api.heyslab.ru/health"

          PWA_ORIGIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PWA_ORIGIN_URL")
          LANDING_ORIGIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$LANDING_ORIGIN_URL")
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL")

          echo "Origin: PWA $PWA_ORIGIN_STATUS | Landing $LANDING_ORIGIN_STATUS | API $API_STATUS"

          if [ "$PWA_ORIGIN_STATUS" != "200" ] || [ "$LANDING_ORIGIN_STATUS" != "200" ] || [ "$API_STATUS" != "200" ]; then
            echo "❌ Origin/API health check failed"
            exit 1
          fi

          echo "✅ Health checks passed (origin OK, CDN propagation is async)"

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ env.BUILD_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SW Cache Version | ${{ env.SW_CACHE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🧾 version.json" >> $GITHUB_STEP_SUMMARY
          if [ -f apps/web/dist/version.json ]; then
            echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
            cat apps/web/dist/version.json >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "version.json missing in dist" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Deployed URLs" >> $GITHUB_STEP_SUMMARY
          echo "| Site | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| PWA | https://app.heyslab.ru |" >> $GITHUB_STEP_SUMMARY
          echo "| Landing | https://heyslab.ru |" >> $GITHUB_STEP_SUMMARY
          echo "| API | https://api.heyslab.ru |" >> $GITHUB_STEP_SUMMARY

  # Fast-path: для release-only push'ей (только apps/web/public/whats-new.json
  # и build-meta.json) пересборка 11.84MB бандлов не нужна. Загружаем 2 файла,
  # purge'аем их в CDN — деплой за ~30с вместо 4 минут.
  fast-release-bump:
    name: Fast Deploy (whats-new only)
    needs: detect
    if: needs.detect.outputs.release_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Validate whats-new structure
        run: |
          node -e "
            const data = require('./apps/web/public/whats-new.json');
            if (!Array.isArray(data.releases) || data.releases.length === 0) {
              console.error('❌ whats-new.json invalid: missing releases array');
              process.exit(1);
            }
            console.log('✅ whats-new.json valid, top release:', data.releases[0].version);
          "

      - name: Setup AWS CLI for Yandex S3
        # Secret names синхронизированы с deploy-artifact job —
        # YC_ACCESS_KEY_ID / YC_SECRET_ACCESS_KEY, не S3_KEY_ID/SECRET.
        run: |
          aws configure set aws_access_key_id ${{ secrets.YC_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.YC_SECRET_ACCESS_KEY }}
          aws configure set default.region ru-central1

      - name: Upload whats-new.json + build-meta.json to PWA bucket
        run: |
          echo "⬆️ Uploading whats-new.json..."
          aws s3 cp apps/web/public/whats-new.json \
            "s3://${{ env.YC_BUCKET_PWA }}/whats-new.json" \
            --content-type "application/json" \
            --cache-control "no-cache, must-revalidate" \
            --endpoint-url "${{ env.YC_ENDPOINT }}"

          # build-meta.json не всегда меняется в release-bump'ах, но грузим его
          # тоже — idempotent + дешёво (~1KB).
          if [ -f apps/web/public/build-meta.json ]; then
            echo "⬆️ Uploading build-meta.json..."
            aws s3 cp apps/web/public/build-meta.json \
              "s3://${{ env.YC_BUCKET_PWA }}/build-meta.json" \
              --content-type "application/json" \
              --cache-control "no-cache, must-revalidate" \
              --endpoint-url "${{ env.YC_ENDPOINT }}"
          fi

      - name: Sync whats-new/ assets (release-note screenshots)
        # isReleaseMetaOnlyFile() matches `apps/web/public/whats-new/` ⇒ release-bump
        # с новыми скриншотами проходит через fast-path. Без этого шага картинки
        # молча терялись бы: detect="release-only" → fast-path → скрины не в S3.
        # `aws s3 sync` идемпотентен и дёшев — без изменений в директории ничего не загружает.
        run: |
          if [ -d apps/web/public/whats-new ]; then
            echo "⬆️ Syncing whats-new/ assets..."
            aws s3 sync apps/web/public/whats-new/ \
              "s3://${{ env.YC_BUCKET_PWA }}/whats-new/" \
              --cache-control "public, max-age=31536000, immutable" \
              --endpoint-url "${{ env.YC_ENDPOINT }}"
          else
            echo "ℹ️  apps/web/public/whats-new/ directory absent — nothing to sync"
          fi

      - name: Invalidate CDN cache
        continue-on-error: true
        env:
          YC_TOKEN: ${{ secrets.YC_OAUTH_TOKEN }}
          YC_FOLDER: ${{ secrets.YC_FOLDER_ID }}
          # Same CDN_PWA_ID as in deploy-artifact job.
          CDN_PWA_ID: bc8rvrvenqslkmti5yts
        run: |
          if [ -z "$YC_TOKEN" ]; then
            echo "⏭️ Skipping CDN invalidation (no YC_OAUTH_TOKEN)"
            exit 0
          fi
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -n
          export PATH="$HOME/yandex-cloud/bin:$PATH"
          yc config set token "$YC_TOKEN"
          yc config set folder-id "$YC_FOLDER"

          # Базовые 2 файла + директория whats-new/* для скриншотов релиз-заметок.
          # CDN-провайдер интерпретирует /whats-new/* как wildcard на префикс —
          # инвалидирует все объекты под этим путём. Иначе при замене существующего
          # скрина с тем же именем CDN бы отдавал старую версию до естественной
          # экспирации (cache-control: immutable max-age=1y).
          yc cdn cache purge --resource-id "$CDN_PWA_ID" \
            --path "/whats-new.json" \
            --path "/build-meta.json" \
            --path "/whats-new/*" || true

      - name: Fast-path summary
        run: |
          echo "## ⚡ Fast Release-Bump Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Only whats-new.json (and build-meta.json if present) deployed." >> $GITHUB_STEP_SUMMARY
          echo "Full bundles unchanged — skipped 11.84MB rebuild + upload." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY

  # Post-deploy sanity check: server actually reflects HEAD.
  # 2026-06-01: добавлено как страховка от "deploy success, но прод не обновился"
  # (incident: fast-path после failed full деплоя оставлял прод на старом hash'е).
  # Full-build path требует exact match, fast-path допускает ancestor (build-meta
  # часто отстаёт на 1 commit при chore(release) bumps).
  verify-deploy:
    name: Verify deployed state vs HEAD
    runs-on: ubuntu-latest
    needs: [detect, deploy-artifact, fast-release-bump]
    if: |
      always() && needs.detect.result == 'success' &&
      (needs.deploy-artifact.result == 'success' || needs.fast-release-bump.result == 'success')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 256

      - name: Compare deployed hash with HEAD
        run: |
          # Дать S3/CDN время на propagation.
          sleep 5

          DEPLOYED=$(curl -fsS -m 15 "https://storage.yandexcloud.net/heys-app/build-meta.json?bust=$(date +%s)" 2>/dev/null \
            | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{console.log(JSON.parse(d).hash||"")}catch{console.log("")}})' \
            || echo "")
          HEAD=$(git rev-parse --short=8 HEAD)
          RELEASE_ONLY="${{ needs.detect.outputs.release_only }}"

          echo "🔍 Deployed: $DEPLOYED"
          echo "🔍 HEAD:     $HEAD"
          echo "🔍 Path:     $([ "$RELEASE_ONLY" = "true" ] && echo fast-deploy || echo full-build)"

          if [ -z "$DEPLOYED" ]; then
            echo "::error::Cannot fetch deployed build-meta.json after deploy — upload broken or CDN stale"
            exit 1
          fi

          if ! git cat-file -e "$DEPLOYED" 2>/dev/null; then
            echo "ℹ️ Deployed hash is outside shallow checkout — fetching full history"
            git fetch --no-tags --prune --unshallow origin 2>/dev/null || git fetch --no-tags --prune origin
          fi

          if [ "$DEPLOYED" = "$HEAD" ]; then
            echo "✅ Exact match — deploy verified"
            exit 0
          fi

          if [ "$RELEASE_ONLY" = "true" ]; then
            # Fast-deploy не запускает update-version.cjs — build-meta может отставать
            # на 1+ commit. Допускаем если deployed = ancestor HEAD.
            if git merge-base --is-ancestor "$DEPLOYED" HEAD 2>/dev/null; then
              echo "⚠️ Hash mismatch ($DEPLOYED != $HEAD) but deployed is ancestor of HEAD — OK for fast-path"
              exit 0
            fi
            echo "::error::Fast-deploy left server with hash $DEPLOYED — NOT in HEAD history"
            exit 1
          fi

          # Full build stamps build-meta via update-version.cjs with the MEANINGFUL
          # commit (resolveReleaseTargetRef), which legitimately lags HEAD when a
          # release/meta commit (e.g. `chore(release): bump whats-new build hash`) sits
          # on top. Accept when the deployed hash is an ancestor of HEAD — the deployed
          # code IS in HEAD's history; only a bookkeeping commit follows it. (Mirrors the
          # fast-path fallback above; empty/non-ancestor hashes still fail below.)
          if git merge-base --is-ancestor "$DEPLOYED" HEAD 2>/dev/null; then
            echo "✅ Deployed $DEPLOYED is an ancestor of HEAD $HEAD (release/meta commit on top) — verified"
            exit 0
          fi

          echo "::error::Full build success но server hash $DEPLOYED не в истории HEAD $HEAD — update-version.cjs или upload broken"
          exit 1

  # Cloud Functions деплоятся отдельным workflow: .github/workflows/cloud-functions-deploy.yml
  # Это предотвращает параллельный двойной деплой при push в main.
