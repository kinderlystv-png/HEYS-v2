<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Check PostgREST RPC</title>
</head>
<body>
  <h1>Проверка RPC <code>reset_client_pin</code> (PostgREST)</h1>
  <p>Без CDN: введите базовый URL PostgREST и API-ключ при запуске проверки. Ключ в страницу не сохраняется.</p>
  <button type="button" onclick="checkRPC()">Проверить</button>
  <pre id="result"></pre>

  <script>
    async function checkRPC() {
      const result = document.getElementById('result');
      result.textContent = 'Проверка...';

      const base = (prompt('PostgREST base URL (без слэша в конце), например https://xxx.supabase.co', '') || '').trim();
      const key = (prompt('API key (anon или service)', '') || '').trim();

      if (!base || !key) {
        result.textContent = 'Отменено: нужны URL и ключ.';
        return;
      }

      const url = `${base.replace(/\/$/, '')}/rest/v1/rpc/reset_client_pin`;

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: {
            apikey: key,
            Authorization: 'Bearer ' + key,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            p_client_id: '00000000-0000-0000-0000-000000000000',
            p_pin_salt: 'test',
            p_pin_hash: 'test',
          }),
        });

        const text = await res.text();
        let parsed;
        try {
          parsed = text ? JSON.parse(text) : null;
        } catch {
          parsed = text;
        }

        if (!res.ok) {
          result.textContent = 'HTTP ' + res.status + '\n' + (typeof parsed === 'string' ? parsed : JSON.stringify(parsed, null, 2));
          return;
        }

        result.textContent = 'Ответ:\n' + JSON.stringify({ status: res.status, body: parsed }, null, 2);
      } catch (e) {
        result.textContent = 'Exception: ' + (e && e.message ? e.message : String(e));
      }
    }
  </script>
</body>
</html>
